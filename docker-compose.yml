services:
  postgres:
    image: postgres:17-alpine
    container_name: postgres_database_container

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - postgres_todo_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

    networks:
      - postgres_todo_network

  server:
    build:
      context: ./server
    container_name: server_container

    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      PORT: ${PORT}
      
    ports:
      - "5000:5000"

    volumes:
      - ./server:/app
      - server_node_modules:/app/node_modules

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - postgres_todo_network

  client:
    build:
      context: ./client
    container_name: client_container

    environment:
      CHOKIDAR_USEPOLLING: "true"
      
    ports:
      - "5173:5173"

    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules

    depends_on:
      - server

    networks:
      - postgres_todo_network

volumes:
  postgres_todo_data:
    name: postgres_todo_volume
  server_node_modules:
  client_node_modules:

networks:
  postgres_todo_network:
    name: postgres_todo_network